<!DOCTYPE html>
<html>
<head>
    <title>My First Azure Web App</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

    <h1>Hello World!</h1>
    <p>This is my first web app deployed from GitHub to Azure.</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="msg"></p>

    <script>
        function showMessage(){
            document.getElementById("msg").innerHTML = "Welcome to Azure Web App!";
        }
    </script>

</body>
</html>
